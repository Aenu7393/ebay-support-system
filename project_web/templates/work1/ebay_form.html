<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBay出品フォーム</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'workweb/css/base.css' %}">
    <script src="{% static 'workweb/js/form.js' %}" defer></script>
</head>

<body>
    <h1>eBay出品ページ</h1>

    <!-- 出品フォーム -->
    <form id="listingForm" action="/list-item/" method="POST">
        {% csrf_token %}
        <label for="title">商品名:</label>
        <input type="text" id="title" name="title" required><br>
    
        <label for="price">価格:</label>
        <input type="number" id="price" name="price" required><br>
    
        <label for="description">説明:</label>
        <textarea id="description" name="description"></textarea><br>
    
        <label for="image_url">画像URL:</label>
        <input type="url" id="image_url" name="image_url" required><br>
    
        <!-- カテゴリIDを入力 -->
        <label for="category">カテゴリID:</label>
        <input type="text" id="category" name="category" required>
        <button type="button" onclick="loadCategoryFields()">カテゴリ情報を取得</button>
    
        <!-- 動的に生成されるカテゴリ特有の項目 -->
        <div id="dynamicFields"></div>
    
        <button type="submit">出品する</button>
    </form>
</body>
</html>
