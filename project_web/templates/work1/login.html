<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'workweb/css/login-css.css' %}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <h1>ログイン</h1>
                <p>アカウントにログインしてサービスをご利用ください</p>
            </div>

            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" name="username" placeholder="ユーザー名を入力" required>
                </div>

                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" name="password" placeholder="パスワードを入力" required>
                </div>

                <button type="submit" class="login-button">ログイン</button>
            </form>

            <div class="signup-section">
                <p>アカウントをお持ちでない方</p>
                <a href="{% url 'work1:signup' %}" class="signup-button">サインアップ</a>
            </div>
        </div>
    </div>
</body>
</html>
