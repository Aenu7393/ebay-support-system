<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL検索フォームと結果表示</title>
</head>
<body>
    <h1>メルカリ スクレイピング</h1>

    <!-- 検索フォーム -->
    <form action="/" method="POST">
        {% csrf_token %}
        <label for="url">メルカリの商品ページURLを入力してください:</label><br>
        <input type="text" id="url" name="url" placeholder="" required><br><br>
        <button type="submit">実行</button>
    </form>

    <!-- スプレッドシートの埋め込み -->
    <h2>スクレイピング結果</h2>
    <iframe src="{{ sheet_url }}" width="100%" height="600"></iframe>

</body>
</html>
